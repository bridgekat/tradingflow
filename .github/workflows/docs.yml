name: Documentation

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # Build the Python package (maturin compiles Rust + installs Python)
      - run: python -m pip install -e ".[dev]"

      # Python docs (Zensical → python/site/)
      - run: python scripts/gen_docs_stubs.py
        working-directory: python
      - run: zensical build --clean
        working-directory: python

      # Rust docs (cargo doc → python/site/native/)
      - run: cargo doc --no-deps --features python
      - run: cp -r target/doc python/site/native

      # Upload to GitHub Pages
      - uses: actions/upload-pages-artifact@v4
        with:
          path: python/site
      - uses: actions/deploy-pages@v4
        id: deployment
