name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        python: ['3.13']
        platform: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # Build the Python package (maturin compiles Rust + installs Python)
      - run: python -m pip install -e ".[dev]"

      # Run Rust tests
      - run: cargo test --lib

      # Run Python tests
      - run: python -m pytest python/tests/ -x -q
